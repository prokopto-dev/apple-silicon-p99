# Packages and publishes a released version: builds P99-Installer.zip from the
# tagged commit, attaches it to the GitHub Release with that version's
# CHANGELOG.md section as notes, then deploys the versioned docs.
#
# Normally dispatched by semantic-release.yml right after it cuts a version
# (its GITHUB_TOKEN tag push can't trigger this workflow directly). The tag
# trigger covers hand-pushed tags, and workflow_dispatch is the manual escape
# hatch to re-package an existing tag. Either way check-version refuses a tag
# that doesn't match pyproject.toml's version.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic-release tag to package (for example v0.5.0)
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Tag must match pyproject version
        run: |
          TAG="${RELEASE_TAG#v}"
          grep -q "^version = \"$TAG\"$" pyproject.toml \
            || { echo "::error::tag $TAG != pyproject version"; exit 1; }

  build:
    needs: check-version
    # macos-15+: Xcode 16's SDK marks the whole View protocol @MainActor
    # (like local CLT builds); Xcode 15 on macos-14 rejects the views.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Build app + zip
        run: make zip
      # The binary's hidden selftest verifies the bundled scripts resolve and
      # the runner/parser work — a release never ships a broken bundle.
      - name: Selftest
        run: '"./dist/P99 Installer.app/Contents/MacOS/P99Installer" --selftest'
      - uses: actions/upload-artifact@v4
        with:
          name: app-zip
          path: dist/P99-Installer.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Extract this version's changelog
        run: |
          VERSION="${RELEASE_TAG#v}"
          awk -v version="$VERSION" '
            $0 ~ "^## .*v?" version "([ (]|$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See the full changelog for v$VERSION." > release-notes.md
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: artifacts/*
          body_path: release-notes.md

  # Versioned docs deploy (mike -> gh-pages). The concurrency group is shared
  # with docs-dev.yml to serialize mike pushes.
  docs:
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: gh-pages-docs
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Fetch gh-pages for mike
        # `|| true`: before the first docs deploy the branch doesn't exist yet.
        run: git fetch origin gh-pages --depth=1 || true
      - name: Install docs tooling
        run: pip install 'mkdocs-material~=9.6' 'mike~=2.1'
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Deploy versioned docs
        run: |
          VERSION="${RELEASE_TAG#v}"
          DOCS_VERSION="${VERSION%.*}"   # 0.5.1 -> 0.5
          mike deploy --push --update-aliases "$DOCS_VERSION" latest
          mike set-default --push latest
